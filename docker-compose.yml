# docker-compose.yml - Corrected service dependency
version: '3.8'

services:
  # 1. The Magento Application Service (Nginx + PHP-FPM)
  magento:
    image: magento/magento-cloud-docker-php:8.2-fpm-1.2
    ports:
      - "80"
    volumes:
      - ./:/app
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOST=opensearch # Pointing to the opensearch service
    depends_on:
      - db
      - redis
      - opensearch # <--- CORRECTED THIS LINE
    networks:
      - magento-network

  # 2. The Database Service (MariaDB)
  db:
    image: mariadb:10.6
    command:
      - '--max_allowed_packet=64M'
      - '--innodb_log_file_size=256M'
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - magento-network

  # 3. The Search Service (OpenSearch)
  opensearch: # <--- Service is named "opensearch"
    image: opensearchproject/opensearch:2.5.0
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"
    networks:
      - magento-network

  # 4. The Caching Service (Redis)
  redis:
    image: redis:6.2-alpine
    networks:
      - magento-network

networks:
  magento-network:

volumes:
  dbdata:
