version: '3.8'
services:
  db-backup:
    image: mariadb:${DB_IMAGE_TAG:-10.6}
    networks:
      - magento-network
    environment:
      - COOLIFY_DATABASE_NAME
      - COOLIFY_DATABASE_USER
      - COOLIFY_DATABASE_PASSWORD
      - COOLIFY_PREVIEW_DEPLOYMENT
      - COOLIFY_FQDN
      # Add the main app URL for preview environments to access
      - MAIN_APP_URL=${MAIN_APP_URL:-}
    volumes:
      - db-backups:/backups
    command: |
      bash -c "
        set -e
        if [ \"$$COOLIFY_PREVIEW_DEPLOYMENT\" == \"true\" ]; then
          echo '⏭️ Preview environment: Fetching backup from main environment...'
          
          if [ -n \"$$MAIN_APP_URL\" ]; then
            echo \"🔗 Attempting to download backup from: $$MAIN_APP_URL/backup/latest.sql\"
            # Try to download backup from main environment via HTTP
            for i in {1..30}; do
              if curl -f -o /backups/latest.sql \"$$MAIN_APP_URL/backup/latest.sql\" 2>/dev/null; then
                echo '✅ Backup downloaded from main environment.'
                break
              fi
              if [ $$i -eq 30 ]; then
                echo '⚠️ Could not download backup from main environment.'
                echo '📁 Creating empty backup file for preview.'
                touch /backups/latest.sql
              fi
              sleep 2
            done
          else
            echo '⚠️ MAIN_APP_URL not set. Cannot fetch backup.'
            touch /backups/latest.sql
          fi
          exit 0
        fi
        
        echo '⏳ Main environment: Waiting for database connection...'
        for i in {1..120}; do
          if mysqladmin ping -h \"db\" --silent; then
            echo '✅ Database connection established.'
            break
          fi
          if [ $$i -eq 120 ]; then
            echo '❌ Database connection timed out after 2 minutes.'
            exit 1
          fi
          sleep 1
        done

        while true; do
          echo '🚀 Starting nightly database backup...'
          BACKUP_FILE=\"/backups/backup_\$(date +%Y%m%d_%H%M%S).sql\"
          mysqldump --no-tablespaces -u root -p$$MYSQL_ROOT_PASSWORD $$COOLIFY_DATABASE_NAME > \"$$BACKUP_FILE\"
          cp \"$$BACKUP_FILE\" /backups/latest.sql
          echo \"✅ Backup completed: $$BACKUP_FILE\"
          
          # Clean up old backups (keep last 7 days)
          find /backups -name 'backup_*.sql' -mtime +7 -delete 2>/dev/null || true
          
          echo '📅 Scheduling next backup in 24 hours.'
          sleep 86400
        done
      "
    restart: "unless-stopped"
    profiles:
      - backup
    depends_on:
      - db

  # Add a simple backup server for the main environment
  backup-server:
    image: nginx:alpine
    networks:
      - magento-network
      - coolify-network
    volumes:
      - db-backups:/usr/share/nginx/html/backup:ro
    environment:
      - COOLIFY_PREVIEW_DEPLOYMENT
    command: |
      sh -c "
        if [ \"$$COOLIFY_PREVIEW_DEPLOYMENT\" == \"true\" ]; then
          echo '⏭️ Backup server not needed in preview environment.'
          exit 0
        fi
        
        # Create simple nginx config to serve backup files
        cat > /etc/nginx/conf.d/default.conf << 'EOF'
        server {
            listen 80;
            server_name _;
            location /backup/ {
                root /usr/share/nginx/html;
                autoindex on;
                add_header Access-Control-Allow-Origin *;
            }
            location / {
                return 404;
            }
        }
        EOF
        
        echo '🌐 Starting backup file server...'
        nginx -g 'daemon off;'
      "
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backup-server.rule=Host(`${COOLIFY_FQDN}`) && PathPrefix(`/backup`)"
      - "traefik.http.routers.backup-server.entrypoints=websecure"
      - "traefik.http.routers.backup-server.tls=true"
      - "traefik.http.routers.backup-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.backup-server.loadbalancer.server.port=80"
    profiles:
      - backup
    depends_on:
      - db-backup

  db:
    image: mariadb:${DB_IMAGE_TAG:-10.6}
    networks:
      - magento-network
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - COOLIFY_PREVIEW_DEPLOYMENT=${COOLIFY_PREVIEW_DEPLOYMENT}
      - COOLIFY_FQDN=${COOLIFY_FQDN}
    volumes:
      - dbdata:/var/lib/mysql
      - db-backups:/backups
    command: |
      bash -c "
        docker-entrypoint.sh mysqld &
        MYSQL_PID=$$!
        
        if [ \"$$COOLIFY_PREVIEW_DEPLOYMENT\" == \"true\" ]; then
          echo '🔎 Preview environment detected. Waiting for database...'
          for i in {1..60}; do
            if mysqladmin ping -h localhost --silent; then
              echo '✅ Database is ready.'
              
              # Wait a moment for backup service to potentially download backup
              sleep 5
              
              if [ -f /backups/latest.sql ] && [ -s /backups/latest.sql ]; then
                echo '📥 Found database backup, starting import...'
                mysql -u root -p\"$$MYSQL_ROOT_PASSWORD\" \"$$MYSQL_DATABASE\" < /backups/latest.sql
                echo '✅ Database import complete.'
                echo '🔧 Sanitizing database for preview environment...'
                
                if [ -n \"$$COOLIFY_FQDN\" ]; then
                  echo \"✅ FQDN found: $$COOLIFY_FQDN. Updating base URLs...\"
                  mysql -u root -p\"$$MYSQL_ROOT_PASSWORD\" \"$$MYSQL_DATABASE\" -e \"
                    UPDATE core_config_data SET value = 'https://$$COOLIFY_FQDN/' WHERE path IN ('web/unsecure/base_url', 'web/secure/base_url');
                  \"
                else
                  echo \"⚠️ COOLIFY_FQDN is empty. Skipping base URL update.\"
                fi
                
                mysql -u root -p\"$$MYSQL_ROOT_PASSWORD\" \"$$MYSQL_DATABASE\" -e \"
                  UPDATE core_config_data SET value = '1' WHERE path LIKE '%dev/debug%';
                  UPDATE core_config_data SET value = 'sandbox' WHERE path LIKE '%payment%mode%';
                \"
                echo '✅ Database sanitization complete.'
              else
                echo '⚠️ No backup found or backup is empty. Starting with a fresh database.'
                echo '📁 Available files in backup directory:'
                ls -la /backups/ || echo 'Backup directory is empty.'
              fi
              break
            fi
            sleep 1
          done
        fi
        wait $$MYSQL_PID
      "

  magento:
    image: shinsenter/magento:${PHP_IMAGE_TAG:-php8.2-nginx}
    networks:
      - magento-network
      - coolify-network
    volumes:
      - magento-code:/var/www/html
    environment:
      - M2_DB_HOST=db
      - M2_DB_NAME=${COOLIFY_DATABASE_NAME:-magento}
      - M2_DB_USER=${COOLIFY_DATABASE_USER:-magento}
      - M2_DB_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - M2_REDIS_HOST=redis
      - M2_SEARCH_ENGINE=opensearch
      - M2_OPENSEARCH_HOST=opensearch
      - M2_BASE_URL=https://${COOLIFY_FQDN:-localhost}/
      - M2_ADMIN_USER=${COOLIFY_ENV_ADMIN_USER:-admin}
      - M2_ADMIN_PASSWORD=${COOLIFY_ENV_ADMIN_PASSWORD:-Password123!}
      - COOLIFY_PREVIEW_DEPLOYMENT=${COOLIFY_PREVIEW_DEPLOYMENT}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.magento-poc.rule=Host(`${COOLIFY_FQDN}`) && !PathPrefix(`/backup`)"
      - "traefik.http.routers.magento-poc.entrypoints=websecure"
      - "traefik.http.routers.magento-poc.tls=true"
      - "traefik.http.routers.magento-poc.tls.certresolver=letsencrypt"
      - "traefik.http.services.magento-poc.loadbalancer.server.port=80"
    depends_on:
      - db
      - redis
      - opensearch

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_IMAGE_TAG:-2.5.0}
    networks:
      - magento-network
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"

  redis:
    image: redis:${REDIS_IMAGE_TAG:-6.2-alpine}
    networks:
      - magento-network

networks:
  magento-network:
  coolify-network:
    name: coolify
    external: true

volumes:
  dbdata:
  magento-code:
  db-backups:
