# docker-compose.yml - Using Coolify's "Magic" Environment Variables
version: '3.8'

services:
  magento:
    image: shinsenter/magento:php8.2-nginx # Use the tag you confirmed works
    volumes:
      # Use a named volume to trigger the auto-download and install.
      - magento-code:/var/www/html
    environment:
      # --- Coolify Magic Variable ---
      # This tells Coolify's proxy to route traffic for the FQDN to this container's port 80.
      # You will set the actual domain (m2demo.ubuntu.orb.local) in the Coolify UI.
      - SERVICE_FQDN_MAGENTO_80

      # --- Database Connection ---
      - M2_DB_HOST=db
      - M2_DB_NAME=${COOLIFY_DATABASE_NAME:-magento}
      - M2_DB_USER=${COOLIFY_DATABASE_USER:-magento}
      - M2_DB_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}

      # --- Redis & OpenSearch ---
      - M2_REDIS_HOST=redis
      - M2_SEARCH_ENGINE=opensearch
      - M2_OPENSEARCH_HOST=opensearch

      # --- Auto-Install Configuration ---
      # This uses another magic variable, SERVICE_URL_MAGENTO, which Coolify
      # will automatically populate with the full URL (e.g., http://m2demo.ubuntu.orb.local).
      - M2_BASE_URL=${SERVICE_URL_MAGENTO}
      - M2_ADMIN_USER=admin
      - M2_ADMIN_PASSWORD=Password123!
    depends_on:
      - db
      - redis
      - opensearch
    networks:
      - magento-network

  # --- No changes are needed for the other services ---
  db:
    image: mariadb:10.6
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - magento-network

  opensearch:
    image: opensearchproject/opensearch:2.5.0
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"
    networks:
      - magento-network

  redis:
    image: redis:6.2-alpine
    networks:
      - magento-network

networks:
  magento-network:

volumes:
  dbdata:
  magento-code:
