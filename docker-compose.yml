# docker-compose.yml - Final Authoritative Version
version: '3.8'

services:
  magento:
    image: shinsenter/magento:8.2-fpm-nginx # Use the tag you confirmed works
    ports:
      - "13371:80" # This explicit port is reliable
    volumes:
      # CRITICAL: Mount a named volume for the code, NOT the local directory.
      # This will be empty on first deploy, triggering the auto-download/install.
      - magento-code:/var/www/html
    environment:
      # --- Database Connection ---
      - M2_DB_HOST=db
      - M2_DB_NAME=${COOLIFY_DATABASE_NAME:-magento}
      - M2_DB_USER=${COOLIFY_DATABASE_USER:-magento}
      - M2_DB_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}

      # --- Redis & OpenSearch ---
      - M2_REDIS_HOST=redis
      - M2_SEARCH_ENGINE=opensearch
      - M2_OPENSEARCH_HOST=opensearch

      # --- Auto-Install Configuration ---
      # The image will see these variables and run setup:install for us.
      - M2_BASE_URL=http://${COOLIFY_FQDN:-localhost}/
      - M2_ADMIN_USER=admin
      - M2_ADMIN_PASSWORD=Password123!
      - M2_ADMIN_EMAIL=admin@example.com
      - M2_ADMIN_FIRSTNAME=Admin
      - M2_ADMIN_LASTNAME=User
    depends_on:
      - db
      - redis
      - opensearch
    networks:
      - magento-network

  # ... The db, opensearch, and redis services remain the same ...
  db:
    image: mariadb:10.6
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - magento-network

  opensearch:
    image: opensearchproject/opensearch:2.5.0
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"
    networks:
      - magento-network

  redis:
    image: redis:6.2-alpine
    networks:
      - magento-network

# Define the volumes that will be created and persisted
networks:
  magento-network:

volumes:
  dbdata:
  magento-code: # This is where your Magento code will live, managed by Docker.
