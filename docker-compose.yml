# docker-compose.yml - CORRECTED VERSION
version: '3.8'

services:
  # 1. The Application Service (PHP-FPM)
  app:
    image: markshust/magento-php:8.2-fpm-4 
    volumes:
      - ./:/var/www/html
      - sock:/var/run/docker.sock
      - appdata:/var/www/html/var
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - ELASTICSEARCH_HOST=elasticsearch
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
      - elasticsearch
    networks:
      - magento-network

  # 2. The Web Server (Nginx)
  web:
    image: markshust/magento-nginx:1.22-3  # <--- CORRECTED IMAGE NAME
    ports:
      - "80" 
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
    networks:
      - magento-network

  # 3. The Database Service (MariaDB)
  db:
    image: mariadb:10.6
    command:
      - '--max_allowed_packet=64M'
      - '--innodb_log_file_size=256M'
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - magento-network

  # 4. The Search Service (Elasticsearch)
  elasticsearch:
    image: markshust/magento-elasticsearch:7.17-1
    environment:
      - discovery.type=single-node
    networks:
      - magento-network

  # 5. The Caching Service (Redis)
  redis:
    image: redis:6.2-alpine
    networks:
      - magento-network

networks:
  magento-network:

volumes:
  dbdata:
  sock:
  appdata:
