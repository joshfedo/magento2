# docker-compose.yml - Using Official Adobe Magento Images
version: '3.8'

services:
  # 1. The Magento Application Service (Nginx + PHP-FPM)
  # Adobe's image bundles the web server and PHP application together.
  magento:
    image: magento/magento-cloud-docker-php:8.2-fpm-1.2 # Official Adobe Image
    ports:
      # Coolify will manage the public-facing port mapping.
      - "80"
    volumes:
      # Mounts your Magento code into the container
      - ./:/app
    environment:
      # Database connection details for Magento
      - MYSQL_HOST=db
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      # Redis connection for Caching/Sessions
      - REDIS_HOST=redis
      # Elasticsearch connection
      - ELASTICSEARCH_HOST=elasticsearch
      # Other required Magento variables
      - MAGENTO_RUN_MODE=developer # Set to 'production' for live sites
    depends_on:
      - db
      - redis
      - elasticsearch
    networks:
      - magento-network

  # 2. The Database Service (MariaDB)
  db:
    image: mariadb:10.6
    command:
      - '--max_allowed_packet=64M'
      - '--innodb_log_file_size=256M'
    environment:
      # These variables create the database and user on first run.
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
    volumes:
      - dbdata:/var/lib/mysql # Persists database data
    networks:
      - magento-network

  # 3. The Search Service (OpenSearch, since it's the successor to ES)
  opensearch:
    image: opensearchproject/opensearch:2.5.0 # Using OpenSearch is more future-proof
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true" # OK for dev, review for prod
    networks:
      - magento-network

  # 4. The Caching Service (Redis)
  redis:
    image: redis:6.2-alpine
    networks:
      - magento-network

# Define the shared network for all services
networks:
  magento-network:

# Define persistent volumes
volumes:
  dbdata:
