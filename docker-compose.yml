# docker-compose.yml - Enhanced for Automated Preview DB Seeding from Nightly Backups
version: '3.8'
services:
  # New service for nightly database backups - only runs on the main environment
  db-backup:
    image: mariadb:${DB_IMAGE_TAG:-10.6}
    networks:
      - magento-network
    environment:
      # Use distinct variable names to avoid conflicts with the image's entrypoint
      - DUMP_DB_HOST=db
      - DUMP_DB_NAME=${COOLIFY_DATABASE_NAME:-magento}
      - DUMP_DB_USER=${COOLIFY_DATABASE_USER:-magento}
      - DUMP_DB_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - COOLIFY_PREVIEW_DEPLOYMENT=${COOLIFY_PREVIEW_DEPLOYMENT}
    volumes:
      - db-backups:/backups
    command: |
      bash -c "
        set -e
        # This service only runs on the main (non-preview) environment
        if [ \"$COOLIFY_PREVIEW_DEPLOYMENT\" == \"true\" ]; then
          echo '⏭️ Skipping backup service on preview environment.'
          exit 0
        fi
        
        # Give the DB service a moment to initialize fully on first start
        echo '⏳ Backup service waiting for database to be ready...'
        sleep 30

        # Loop to perform nightly backups
        while true; do
          echo '🚀 Starting nightly database backup...'
          
          # Check for necessary variables to prevent errors
          if [ -z \"$DUMP_DB_HOST\" ] || [ -z \"$DUMP_DB_USER\" ] || [ -z \"$DUMP_DB_PASSWORD\" ] || [ -z \"$DUMP_DB_NAME\" ]; then
            echo '❌ Error: Database connection variables are not set. Skipping backup.'
          else
            # Execute the dump with the --no-tablespaces flag for better compatibility
            mysqldump --no-tablespaces -h \"$DUMP_DB_HOST\" -u \"$DUMP_DB_USER\" -p\"$DUMP_DB_PASSWORD\" \"$DUMP_DB_NAME\" > /backups/latest.sql
            echo '✅ Nightly backup complete.'
          fi
          
          echo '📅 Scheduling next backup in 24 hours.'
          sleep 86400 # Sleep for 24 hours
        done
      "
    restart: "unless-stopped"
    profiles:
      - backup
    depends_on:
      - db

  # Database service for both main and preview environments
  db:
    image: mariadb:${DB_IMAGE_TAG:-10.6}
    networks:
      - magento-network
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - COOLIFY_PREVIEW_DEPLOYMENT=${COOLIFY_PREVIEW_DEPLOYMENT}
      - COOLIFY_FQDN=${COOLIFY_FQDN}
    volumes:
      - dbdata:/var/lib/mysql
      - db-backups:/backups
    # This initialization script will import the latest backup on preview environments
    command: |
      bash -c "
        # Default entrypoint starts MariaDB
        docker-entrypoint.sh mysqld &
        MYSQL_PID=$!

        # For preview deployments, wait for DB to be ready and import the backup
        if [ \"$COOLIFY_PREVIEW_DEPLOYMENT\" == \"true\" ]; then
          echo '🔎 Preview environment detected, waiting for database...'
          for i in {1..60}; do
            if mysqladmin ping -h localhost --silent; then
              echo '✅ Database is ready.'
              # Check if a backup file exists and import it
              if [ -f /backups/latest.sql ]; then
                echo '📥 Found database backup, starting import...'
                mysql -u root -p\"$MYSQL_ROOT_PASSWORD\" \"$MYSQL_DATABASE\" < /backups/latest.sql
                echo '✅ Database import complete.'
                # Sanitize data for the preview environment
                mysql -u root -p\"$MYSQL_ROOT_PASSWORD\" \"$MYSQL_DATABASE\" -e \"
                  UPDATE core_config_data SET value = 'https://\$COOLIFY_FQDN/' WHERE path IN ('web/unsecure/base_url', 'web/secure/base_url');
                  UPDATE core_config_data SET value = '1' WHERE path LIKE '%dev/debug%';
                  UPDATE core_config_data SET value = 'sandbox' WHERE path LIKE '%payment%mode%';
                \"
                echo '🔧 Database sanitized for preview environment.'
              else
                echo '⚠️ No backup found. Starting with a fresh database.'
              fi
              break
            fi
            echo -n '.'
            sleep 1
          done
        fi
        wait $MYSQL_PID
      "

  magento:
    image: shinsenter/magento:${PHP_IMAGE_TAG:-php8.2-nginx}
    networks:
      - magento-network
      - coolify-network
    volumes:
      - magento-code:/var/www/html
    environment:
      - M2_DB_HOST=db
      - M2_DB_NAME=${COOLIFY_DATABASE_NAME:-magento}
      - M2_DB_USER=${COOLIFY_DATABASE_USER:-magento}
      - M2_DB_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - M2_REDIS_HOST=redis
      - M2_SEARCH_ENGINE=opensearch
      - M2_OPENSEARCH_HOST=opensearch
      - M2_BASE_URL=https://${COOLIFY_FQDN:-localhost}/
      - M2_ADMIN_USER=${COOLIFY_ENV_ADMIN_USER:-admin}
      - M2_ADMIN_PASSWORD=${COOLIFY_ENV_ADMIN_PASSWORD:-Password123!}
      - COOLIFY_PREVIEW_DEPLOYMENT=${COOLIFY_PREVIEW_DEPLOYMENT}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.magento-poc.rule=Host(`${COOLIFY_FQDN}`)"
      - "traefik.http.routers.magento-poc.entrypoints=websecure"
      - "traefik.http.routers.magento-poc.tls=true"
      - "traefik.http.routers.magento-poc.tls.certresolver=letsencrypt"
      - "traefik.http.services.magento-poc.loadbalancer.server.port=80"
    depends_on:
      - db
      - redis
      - opensearch

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_IMAGE_TAG:-2.5.0}
    networks:
      - magento-network
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"

  redis:
    image: redis:${REDIS_IMAGE_TAG:-6.2-alpine}
    networks:
      - magento-network

networks:
  magento-network:
  coolify-network:
    name: coolify
    external: true

volumes:
  dbdata:
  magento-code:
  db-backups: # Shared volume to store database backups
