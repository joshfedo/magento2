# docker-compose.yml - For deploying an EXISTING Magento repo with shinsenter/magento
version: '3.8'

services:
  # 1. The All-in-One Magento Service
  magento:
    image: shinsenter/magento:php8.2-nginx
    expose:
      - "80"
    volumes:
      # Mount the code from your Git repository into the container.
      # This is the correct way for a Git-based workflow.
      - ./:/var/www/html
    environment:
      # --- Database Connection ---
      # These are used by Magento to connect to the DB.
      - M2_DB_HOST=db
      - M2_DB_NAME=${COOLIFY_DATABASE_NAME:-magento}
      - M2_DB_USER=${COOLIFY_DATABASE_USER:-magento}
      - M2_DB_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}

      # --- Redis Connection ---
      - M2_REDIS_HOST=redis

      # --- OpenSearch Connection ---
      - M2_SEARCH_ENGINE=opensearch
      - M2_OPENSEARCH_HOST=opensearch

      # --- CRITICAL CHANGE: Disable Auto-Install ---
      # We will manage the installation ourselves. Setting M2_ADMIN_USER to an empty
      # string is the documented way to prevent the auto-install script from running.
      - M2_ADMIN_USER=
      - M2_BASE_URL=http://${COOLIFY_FQDN:-localhost}/
    depends_on:
      - db
      - redis
      - opensearch
    networks:
      - magento-network

  # ... (The db, opensearch, and redis services remain exactly the same as before) ...
  db:
    image: mariadb:10.6
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - magento-network

  opensearch:
    image: opensearchproject/opensearch:2.5.0
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"
    networks:
      - magento-network

  redis:
    image: redis:6.2-alpine
    networks:
      - magento-network

networks:
  magento-network:

volumes:
  dbdata:
