# docker-compose.yml - Final Version with Traefik Labels
version: '3.8'

services:
  magento:
    image: shinsenter/magento:php8.2-nginx # Use your confirmed working tag
    networks:
      - magento-network
      # Connect to Coolify's main network so the proxy can see this container
      - coolify-network
    volumes:
      # Use a named volume to trigger the auto-download and install.
      - magento-code:/var/www/html
    environment:
      # All auto-install environment variables remain the same
      - M2_DB_HOST=db
      - M2_DB_NAME=${COOLIFY_DATABASE_NAME:-magento}
      - M2_DB_USER=${COOLIFY_DATABASE_USER:-magento}
      - M2_DB_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
      - M2_REDIS_HOST=redis
      - M2_SEARCH_ENGINE=opensearch
      - M2_OPENSEARCH_HOST=opensearch
      - M2_BASE_URL=http://${COOLIFY_FQDN:-localhost}/
      - M2_ADMIN_USER=admin
      - M2_ADMIN_PASSWORD=Password123!
    depends_on:
      - db
      - redis
      - opensearch
    # --- CRITICAL ADDITION: LABELS FOR TRAEFIK PROXY ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.magento-poc.rule=Host(`${COOLIFY_FQDN}`)"
      - "traefik.http.routers.magento-poc.entrypoints=http"
      - "traefik.http.services.magento-poc.loadbalancer.server.port=80"

  # --- No changes are needed for the other services ---
  db:
    image: mariadb:10.6
    networks:
      - magento-network
    environment:
      - MYSQL_ROOT_PASSWORD=${COOLIFY_DATABASE_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${COOLIFY_DATABASE_NAME:-magento}
      - MYSQL_USER=${COOLIFY_DATABASE_USER:-magento}
      - MYSQL_PASSWORD=${COOLIFY_DATABASE_PASSWORD:-magento_password}
    volumes:
      - dbdata:/var/lib/mysql

  opensearch:
    image: opensearchproject/opensearch:2.5.0
    networks:
      - magento-network
    environment:
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"

  redis:
    image: redis:6.2-alpine
    networks:
      - magento-network

# --- CRITICAL NETWORK DEFINITION ---
networks:
  magento-network:
  coolify-network:
    # This tells Docker to connect to the existing network used by the proxy
    name: coolify
    external: true

volumes:
  dbdata:
  magento-code:
