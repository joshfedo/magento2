# .coolify.yaml - Place in the root of your Git repository
tasks:
  # This command runs *after* the services are started for the first time.
  # It installs Magento using the environment variables from the docker-compose file.
  setup:
    command: |
      docker exec $(docker ps -q -f "name=app") bash -c \
        "bin/magento setup:install \
          --db-host=\"$MYSQL_HOST\" \
          --db-name=\"$MYSQL_DATABASE\" \
          --db-user=\"$MYSQL_USER\" \
          --db-password=\"$MYSQL_PASSWORD\" \
          --search-engine='elasticsearch7' \
          --elasticsearch-host=\"$ELASTICSEARCH_HOST\" \
          --base-url=\"http://$COOLIFY_FQDN/\" \
          --admin-firstname=Admin \
          --admin-lastname=User \
          --admin-email=admin@example.com \
          --admin-user=admin \
          --admin-password=Password123 \
          --language=en_US \
          --currency=USD \
          --timezone=America/Chicago \
          --use-rewrites=1 && \
        bin/magento deploy:mode:set developer"
