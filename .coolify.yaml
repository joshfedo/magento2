# .coolify.yaml - Updated for Adobe Docker Images
tasks:
  setup:
    command: |
      # Wait a few seconds for all services to be ready
      sleep 15;
      # Find the running container named 'magento' and execute setup inside it
      docker exec $(docker ps -q -f "name=magento") bash -c \
        "bin/magento setup:install \
          --db-host=\"$MYSQL_HOST\" \
          --db-name=\"$MYSQL_DATABASE\" \
          --db-user=\"$MYSQL_USER\" \
          --db-password=\"$MYSQL_PASSWORD\" \
          --search-engine='opensearch' \
          --opensearch-host=\"$ELASTICSEARCH_HOST\" \
          --base-url=\"http://$COOLIFY_FQDN/\" \
          --admin-firstname=Admin \
          --admin-lastname=User \
          --admin-email=admin@example.com \
          --admin-user=admin \
          --admin-password=Password123 \
          --language=en_US \
          --currency=USD \
          --timezone=America/Chicago \
          --use-rewrites=1 && \
        bin/magento deploy:mode:set developer"
