# .coolify.yaml - Final version
tasks:
  setup:
    command: |
      echo "--- Starting Magento Setup Task ---"
      # Wait for the database to be fully ready
      sleep 20;

      echo "Attempting to run Magento setup:install..."
      # Use the predictable container name to execute the command
      docker exec magento-app bin/magento setup:install \
          --db-host="$M2_DB_HOST" \
          --db-name="$M2_DB_NAME" \
          --db-user="$M2_DB_USER" \
          --db-password="$M2_DB_PASSWORD" \
          --search-engine="$M2_SEARCH_ENGINE" \
          --opensearch-host="$M2_OPENSEARCH_HOST" \
          --base-url="$M2_BASE_URL" \
          --admin-firstname=Admin \
          --admin-lastname=User \
          --admin-email=admin@example.com \
          --admin-user=admin \
          --admin-password=Password123! \
          --use-rewrites=1 || { echo "Magento setup:install failed!"; exit 1; }
      
      echo "Magento setup:install completed. Setting developer mode..."
      docker exec magento-app bin/magento deploy:mode:set developer
      
      echo "--- Magento Setup Task Finished ---"
