# .coolify.yaml - For manually installing Magento
tasks:
  # This 'setup' task runs only on the very first deployment
  setup:
    command: |
      # Wait for services to be fully ready
      sleep 15;
      # Find the running container and execute the install command inside it
      docker exec $(docker ps -q -f "name=magento") bash -c \
        "bin/magento setup:install \
          --db-host=\"$M2_DB_HOST\" \
          --db-name=\"$M2_DB_NAME\" \
          --db-user=\"$M2_DB_USER\" \
          --db-password=\"$M2_DB_PASSWORD\" \
          --search-engine=\"$M2_SEARCH_ENGINE\" \
          --opensearch-host=\"$M2_OPENSEARCH_HOST\" \
          --base-url=\"$M2_BASE_URL\" \
          --admin-firstname=Admin \
          --admin-lastname=User \
          --admin-email=admin@example.com \
          --admin-user=admin \
          --admin-password=Password123! \
          --use-rewrites=1 && \
        bin/magento deploy:mode:set developer"
